<!DOCTYPE html><html lang="en"><head>
<link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Security Alerts — AIC Kapsowar HMS</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="themes.css">
<style>
:root{--bg:#050a14;--s1:#0d1b2a;--s2:#112240;--s3:#1a2f50;--p:#1e6bff;--ph:#2979ff;--pd:#1557d4;--a:#00b4d8;--a2:#38bdf8;--t:#e2e8f0;--tm:#94a3b8;--tf:#64748b;--bd:#1e3a6e;--bd2:#2a4a8e;--sg:#22c55e;--sbg:#052e16;--sbd:#166534;--wg:#f59e0b;--wbg:#1c1400;--wbd:#92400e;--dg:#ef4444;--dbg:#1a0505;--dbd:#7f1d1d;--ig:#38bdf8;--ibg:#0c1f35;--ibd:#0c4a6e}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px}a{color:var(--p);text-decoration:none}
.inp{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:9px;font-size:13px;background:var(--s2);color:var(--t);outline:none;transition:all .2s;font-family:inherit}.inp:focus{border-color:var(--p);box-shadow:0 0 0 3px #1e6bff20}.inp::placeholder{color:var(--tf)}
.btn{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--s2);color:var(--t);transition:all .2s;font-family:inherit}.btn:hover{background:var(--s3)}.btn-p{background:linear-gradient(135deg,var(--pd),var(--p));border-color:transparent;color:#fff}.btn-p:hover{opacity:.9}.btn-d{background:var(--dbg);border-color:var(--dbd);color:var(--dg)}.btn-g{background:var(--sbg);border-color:var(--sbd);color:var(--sg)}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}.bg{background:var(--sbg);color:var(--sg);border:1px solid var(--sbd)}.bb{background:var(--ibg);color:var(--ig);border:1px solid var(--ibd)}.ba{background:var(--wbg);color:var(--wg);border:1px solid var(--wbd)}.br{background:var(--dbg);color:var(--dg);border:1px solid var(--dbd)}.bgr{background:var(--s2);color:var(--tm);border:1px solid var(--bd)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;color:var(--tf);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);background:var(--s2);white-space:nowrap}.tbl td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:top}.tbl tr:hover td{background:var(--s2)}
.mono{font-family:monospace;font-size:11px}.muted{color:var(--tm);font-size:12px}
.band{height:4px;background:linear-gradient(90deg,var(--pd),var(--p),var(--a),var(--p))}
.top-header{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px #00000040}
.logo-img{width:42px;height:42px;border-radius:50%;object-fit:contain;background:#fff;border:2px solid var(--p);flex-shrink:0}
.site-title{font-size:14px;font-weight:800;color:var(--t)}.site-sub{font-size:10px;color:var(--a);letter-spacing:.08em;text-transform:uppercase}
.sidebar{width:200px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;height:100%}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;font-size:12px;color:var(--tm);border-radius:8px;margin:2px 6px;transition:all .15s}.nav-item:hover{background:var(--s2);color:var(--t)}.nav-item.active{background:var(--ibg);color:var(--ig);font-weight:700;border:1px solid var(--ibd)}
.app{display:flex;height:calc(100vh - 56px);overflow:hidden}.main-content{flex:1;overflow-y:auto;background:var(--bg)}
.page{padding:20px;max-width:1200px}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:gap}
.page-title{font-size:18px;font-weight:800}.page-sub{font-size:12px;color:var(--tm);margin-top:2px}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar .inp{max-width:220px}
.stat-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px;text-align:center}.stat-num{font-size:28px;font-weight:800;line-height:1.1}.stat-lbl{font-size:10px;color:var(--tf);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:700}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sec-title{font-size:13px;font-weight:700;color:var(--a2);border-bottom:1px solid var(--bd);padding-bottom:7px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.info-box{padding:11px 14px;background:var(--ibg);border-left:3px solid var(--p);border-radius:0 9px 9px 0;font-size:12px;color:var(--tm);margin-bottom:14px}
.danger-box{padding:11px 14px;background:var(--dbg);border-left:3px solid var(--dg);border-radius:0 9px 9px 0;font-size:12px;color:var(--dg);margin-bottom:10px}
.success-box{padding:11px 14px;background:var(--sbg);border-left:3px solid var(--sg);border-radius:0 9px 9px 0;font-size:12px;color:var(--sg);margin-bottom:10px}
.alert-critical{background:var(--dbg);border-left:4px solid var(--dg);border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:12px}
.alert-high{background:var(--wbg);border-left:4px solid var(--wg);border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:12px}
.alert-medium{background:var(--ibg);border-left:4px solid var(--ig);border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:12px}
.alert-low{background:var(--s2);border-left:4px solid var(--bd2);border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:12px}
.modal-overlay{display:none;position:fixed;inset:0;background:#00000080;z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.06em}
.lbl.req::after{content:" *";color:var(--dg)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pagination{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;color:var(--tm)}
.pagination button{padding:5px 12px;border-radius:6px;font-size:12px}
@media(max-width:768px){.g4,.g3{grid-template-columns:1fr 1fr}.sidebar{display:none}.app{flex-direction:column}}
@media(max-width:480px){.g4,.g3,.g2{grid-template-columns:1fr}.filter-bar .inp{max-width:100%}}
</style></head><body>

<script src="shared.js"></script>
<script>

var user = JSON.parse(localStorage.getItem('user') || '{}');
if (!user.id) window.location.href = 'login.html';
var isAdmin = user.role === 'admin';
function logout() { localStorage.clear(); window.location.href = 'login.html'; }
function go(page) { window.location.href = page; }
function g(id) { return document.getElementById(id); }
async function apiFetch(path, opts) {
  opts = opts || {};
  var token = localStorage.getItem('token');
  var res = await fetch('http://localhost:5000/api' + path, {
    headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  var data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}
function initUser() {
  if (g('uName')) g('uName').textContent = user.name || '';
  if (g('uId')) g('uId').textContent = user.staffId || '';
  if (g('uRole')) g('uRole').textContent = (user.role || '').toUpperCase() + ' · ' + (user.dept || '');
  if (isAdmin) {
    if (g('navNet')) g('navNet').style.display = 'flex';
    if (g('navSiem')) g('navSiem').style.display = 'flex';
    if (g('navAlerts')) g('navAlerts').style.display = 'flex';
  }
}
function setActive(id) { var el = g(id); if (el) { el.className = 'nav-item active'; } }
async function loadAlertBell() {
  if (!isAdmin) return;
  try {
    var d = await apiFetch('/security-alerts');
    var active = d.filter(function(a) { return a.status === 'active'; }).length;
    if (active > 0) {
      var bell = g('alertBell');
      if (bell) { g('alertCount').textContent = active; bell.style.display = 'block'; }
    }
  } catch(e) {}
}


var alertData = [];
var filterStatus = 'all';

async function loadAlerts() {
  try {
    alertData = await apiFetch('/security-alerts');
    renderAlerts();
  } catch(e) {
    if (e.message.includes('Insufficient') || e.message.includes('permissions')) {
      g('pc').innerHTML = '<div class="danger-box">🔒 Access Denied — Admin role required</div>';
    } else {
      g('pc').innerHTML = '<div class="danger-box">Failed: ' + e.message + '</div>';
    }
  }
}

function renderAlerts() {
  var filtered = filterStatus === 'all' ? alertData :
    alertData.filter(function(a){ return a.status === filterStatus; });

  var critical = alertData.filter(function(a){return a.severity==='critical'&&a.status==='active';}).length;
  var high = alertData.filter(function(a){return a.severity==='high'&&a.status==='active';}).length;
  var medium = alertData.filter(function(a){return a.severity==='medium'&&a.status==='active';}).length;
  var resolved = alertData.filter(function(a){return a.status==='resolved'||a.status==='dismissed';}).length;

  var sb = function(s) { return {critical:'br',high:'ba',medium:'bb',low:'bgr'}[s]||'bgr'; };
  var ac = function(s) { return {critical:'alert-critical',high:'alert-high',medium:'alert-medium',low:'alert-low'}[s]||'alert-low'; };

  g('pc').innerHTML =
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">'
    + '<div><div class="page-title">🚨 Security Alerts</div>'
    + '<div class="page-sub">Cybersecurity incident management &nbsp;·&nbsp; Admin &amp; IT Security only</div></div>'
    + '<button class="btn" onclick="loadAlerts()">⟳ Refresh</button>'
    + '</div>'
    + '<div class="g4" style="margin-bottom:18px">'
    + '<div class="stat-card" style="border-color:var(--dbd)"><div class="stat-lbl">Critical Active</div><div class="stat-num" style="color:var(--dg)">' + critical + '</div></div>'
    + '<div class="stat-card" style="border-color:var(--wbd)"><div class="stat-lbl">High Active</div><div class="stat-num" style="color:var(--wg)">' + high + '</div></div>'
    + '<div class="stat-card" style="border-color:var(--ibd)"><div class="stat-lbl">Medium Active</div><div class="stat-num" style="color:var(--ig)">' + medium + '</div></div>'
    + '<div class="stat-card"><div class="stat-lbl">Resolved/Dismissed</div><div class="stat-num" style="color:var(--sg)">' + resolved + '</div></div>'
    + '</div>'
    + (critical > 0 ? '<div class="danger-box" style="margin-bottom:14px">🔴 ' + critical + ' CRITICAL alert(s) require immediate attention!</div>' : '')
    + '<div class="filter-bar">'
    + '<select class="inp" onchange="filterStatus=this.value;renderAlerts()" style="max-width:180px">'
    + ['all','active','acknowledged','resolved','dismissed'].map(function(s){return '<option value="'+s+'"'+(filterStatus===s?' selected':'')+'>'+s.toUpperCase()+'</option>';}).join('')
    + '</select>'
    + '</div>'
    + (filtered.length ? filtered.map(function(a) {
        return '<div class="' + ac(a.severity) + '" id="alert_' + a.id + '">'
          + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px">'
          + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
          + '<span class="badge ' + sb(a.severity) + '">' + (a.severity||'').toUpperCase() + '</span>'
          + '<span class="badge bgr" style="font-size:9px">' + (a.category||'Unknown') + '</span>'
          + '<span class="badge ' + (a.status==='active'?'br':a.status==='acknowledged'?'ba':'bg') + '" style="font-size:9px">' + (a.status||'').toUpperCase() + '</span>'
          + '<span style="font-size:13px;font-weight:700">' + a.title + '</span>'
          + '</div>'
          + '<div style="display:flex;gap:6px;flex-shrink:0">'
          + (a.status==='active' ? '<button class="btn" style="font-size:11px;padding:5px 12px;background:var(--wbg);border-color:var(--wbd);color:var(--wg)" onclick="updateAlert(\''+a.id+'\',\'acknowledged\')">Acknowledge</button>' : '')
          + (a.status==='active'||a.status==='acknowledged' ? '<button class="btn btn-g" style="font-size:11px;padding:5px 12px" onclick="updateAlert(\''+a.id+'\',\'resolved\')">Resolve</button>' : '')
          + (a.status==='active' ? '<button class="btn" style="font-size:11px;padding:5px 12px" onclick="updateAlert(\''+a.id+'\',\'dismissed\')">Dismiss</button>' : '')
          + '</div>'
          + '</div>'
          + '<div style="font-size:13px;color:var(--t);margin-bottom:8px">' + (a.description||'') + '</div>'
          + '<div style="display:flex;gap:16px;flex-wrap:wrap">'
          + '<span style="font-size:11px;color:var(--tf)">🖥 Source: <strong style="color:var(--tm)">' + (a.source||'—') + '</strong></span>'
          + (a.source_ip && a.source_ip !== 'N/A' ? '<span style="font-size:11px;color:var(--tf)">📍 IP: <strong class="mono" style="color:var(--tm)">' + a.source_ip + '</strong></span>' : '')
          + '<span style="font-size:11px;color:var(--tf)">🕐 ' + new Date(a.created_at).toLocaleString('en-KE') + '</span>'
          + (a.acknowledged_at ? '<span style="font-size:11px;color:var(--tf)">✓ Acknowledged: ' + new Date(a.acknowledged_at).toLocaleString('en-KE') + '</span>' : '')
          + '</div>'
          + '</div>';
      }).join('') : '<div class="success-box">No alerts match the selected filter.</div>');
}

async function updateAlert(id, status) {
  try {
    await apiFetch('/security-alerts/' + id, {method:'PUT', body:{status:status}});
    loadAlerts();
  } catch(e) { alert('Failed: ' + e.message); }
}

if (!isAdmin) { g('pc').innerHTML = '<div class="danger-box">🔒 Admin access required</div>'; }
else { loadAlerts(); }

initUser();setActive("navAlerts");loadAlertBell();
</script>
<script src="settings.js"></script>
</body></html>
