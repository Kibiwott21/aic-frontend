<script>
requireAuth(["admin"]);
buildSidebar("admin-dashboard.html");

if(!isAdmin){g("pc").innerHTML='<div class="danger-box">🔒 Admin access required</div>';}
else{
async function load(){
  try{
    var d=new Date().toISOString().slice(0,10);
    var [stats,repts,att,alerts]=await Promise.all([
      api("/dashboard/stats"),
      api("/reports/all?date="+d+"&limit=100"),
      api("/attendance/daily?date="+d),
      api("/security-alerts")
    ]);
    render(stats,repts,att,alerts,d);
  }catch(e){g("pc").innerHTML='<div class="danger-box">'+e.message+'</div>';}
}

function render(stats,repts,att,alerts,d){

async function loadProfileSummary() {
  try {
    var d = await api("/admin/profile");
    var s = d.staff, p = d.profile;
    var name = [s.first_name, s.last_name].filter(Boolean).join(" ");
    var html = '<div style="display:flex;align-items:center;gap:14px;padding:4px 0">';
    if (p && p.profile_photo_b64) {
      html += '<img src="' + escapeHtml(p.profile_photo_b64) + '" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)">';
    } else {
      html += '<div style="width:52px;height:52px;border-radius:50%;background:var(--gs2);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:22px">👤</div>';
    }
    html += '<div>';
    html += '<div style="font-weight:700;font-size:14px">' + escapeHtml(name) + '</div>';
    html += '<div style="font-size:11px;color:var(--gold)">' + escapeHtml(s.staff_id || "") + ' · ' + escapeHtml(s.admin_type ? s.admin_type.charAt(0).toUpperCase()+s.admin_type.slice(1) : "Admin") + '</div>';
    if (p && p.bio) html += '<div style="font-size:11px;color:var(--tf);margin-top:2px">' + escapeHtml(p.bio.slice(0,80)) + (p.bio.length > 80 ? "..." : "") + '</div>';
    if (p && p.signature_text) html += '<div style="font-size:10px;color:var(--tm);margin-top:2px;font-style:italic">' + escapeHtml(p.signature_text) + '</div>';
    html += '</div></div>';
    var el = g("profileSummary");
    if (el) el.innerHTML = html;
  } catch(e) {
    var el = g("profileSummary");
    if (el) el.textContent = "Could not load profile.";
  }
}

async function showProfile() {
  try {
    var d = await api("/admin/profile");
    var s = d.staff, p = d.profile || {};
    g("pfFirst").value = s.first_name || "";
    g("pfLast").value = s.last_name || "";
    g("pfPhone").value = p.direct_phone || s.phone || "";
    g("pfOffice").value = p.office_location || "";
    g("pfBio").value = p.bio || "";
    g("pfResp").value = p.responsibilities || "";
    g("pfSig").value = p.signature_text || "";
    g("pfCurPw").value = ""; g("pfNewPw").value = "";
    g("profileErr").style.display = "none"; g("profileOk").style.display = "none";
    g("profilePanel").style.display = "";
    g("profilePanel").scrollIntoView({behavior:"smooth"});
  } catch(e) { alert(e.message); }
}

async function saveProfile() {
  g("profileErr").style.display = "none"; g("profileOk").style.display = "none";
  try {
    await api("/admin/profile", { method: "PUT", body: {
      firstName: g("pfFirst").value.trim(),
      lastName: g("pfLast").value.trim(),
      phone: g("pfPhone").value.trim(),
      officeLocation: g("pfOffice").value.trim(),
      bio: g("pfBio").value.trim(),
      responsibilities: g("pfResp").value.trim(),
      signatureText: g("pfSig").value.trim()
    }});
    g("profileOk").textContent = "✅ Profile saved successfully.";
    g("profileOk").style.display = "";
    loadProfileSummary();
  } catch(e) { g("profileErr").textContent = e.message; g("profileErr").style.display = ""; }
}

async function savePw() {
  g("profileErr").style.display = "none"; g("profileOk").style.display = "none";
  var cur = g("pfCurPw").value, nw = g("pfNewPw").value;
  if (!cur || !nw) { g("profileErr").textContent = "Both password fields are required"; g("profileErr").style.display = ""; return; }
  if (nw.length < 8) { g("profileErr").textContent = "New password must be at least 8 characters"; g("profileErr").style.display = ""; return; }
  try {
    await api("/admin/change-password", { method: "PUT", body: { currentPassword: cur, newPassword: nw }});
    g("profileOk").textContent = "✅ Password changed. You will need to use the new password next login.";
    g("profileOk").style.display = "";
    g("pfCurPw").value = ""; g("pfNewPw").value = "";
  } catch(e) { g("profileErr").textContent = e.message; g("profileErr").style.display = ""; }
}

async function loadStaffList() {
  var el = g("staffList");
  if (!el) return;
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tf)">Loading...</div>';
  try {
    var staff = await api("/notifications/all-staff");
    renderStaffList(staff);
  } catch(e) { el.innerHTML = '<div class="danger-box">'+e.message+'</div>'; }
}

function renderStaffList(staff) {
  var el = g("staffList");
  if (!staff || !staff.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tf)">No staff members found</div>';
    return;
  }
  var h = '<table class="tbl"><thead><tr><th>Name</th><th>Dept</th><th>Role</th><th>Verified</th><th>Actions</th></tr></thead><tbody>';
  staff.forEach(function(s) {
    var name = [s.first_name, s.last_name].filter(Boolean).join(" ");
    var verified = s.email_verified ? '<span class="badge bg">✓</span>' : '<span class="badge br">Pending</span>';
    var actions = '';
    if (!s.email_verified) {
      actions += '<button class="btn" style="padding:4px 8px;font-size:10px;margin-right:4px" onclick="resendStaffVerify(\''+s.staff_id+'\')">📧 Resend</button>';
      actions += '<button class="btn btn-gold" style="padding:4px 8px;font-size:10px;margin-right:4px" onclick="verifyStaffManual(\''+s.staff_id+'\')">✓ Verify</button>';
    }
    actions += '<button class="btn" style="padding:4px 8px;font-size:10px;margin-right:4px" onclick="viewStaffProfile(\''+s.staff_id+'\')">👁 View</button>';
    actions += '<button class="btn btn-gold" style="padding:4px 8px;font-size:10px;margin-right:4px" onclick="editStaff(\''+s.staff_id+'\')">✏ Edit</button>';
    actions += '<button class="btn btn-d" style="padding:4px 8px;font-size:10px" onclick="deleteStaff(\''+s.staff_id+'\')">🗑 Delete</button>';
    h += '<tr><td style="font-weight:600;font-size:12px">'+name+'</td>';
    h += '<td><span class="badge bgold">'+(s.dept_code || "—")+'</span></td>';
    h += '<td style="font-size:11px">'+(s.role || "—")+'</td>';
    h += '<td>'+verified+'</td>';
    h += '<td>'+actions+'</td></tr>';
  });
  h += '</tbody></table>';
  el.innerHTML = h;
}

async function resendStaffVerify(staffId) {
  if (!confirm("Resend verification email to "+staffId+"?")) return;
  try {
    await api("/notifications/resend-verification", { method: "POST", body: { staffId } });
    alert("✅ Verification email sent!");
    loadStaffList();
  } catch(e) { alert(e.message); }
}

async function verifyStaffManual(staffId) {
  if (!confirm("Manually verify staff "+staffId+"? They will be able to log in without email verification.")) return;
  try {
    await api("/staff/"+staffId+"/verify-manual", { method: "POST" });
    alert("✅ Staff has been verified and can now log in!");
    loadStaffList();
  } catch(e) { alert(e.message); }
}

async function deleteStaff(staffId) {
  if (!confirm("⚠️ Permanently delete staff member "+staffId+"? This cannot be undone!")) return;
  if (!confirm("Are you absolutely sure?")) return;
  try {
    await api("/notifications/staff/"+staffId, { method: "DELETE" });
    alert("✅ Staff member deleted");
    loadStaffList();
  } catch(e) { alert(e.message); }
}

  h += '</div>';
  h += '<div class="g2">';
  h += '<div class="field"><label class="lbl">Email</label><input class="inp" id="editEmail" placeholder="email@example.com"></div>';
  h += '<div class="field"><label class="lbl">Phone</label><input class="inp" id="editPhone" placeholder="+254..."></div>';
  h += '</div>';
  h += '<div class="g2">';
  h += '<div class="field"><label class="lbl">Department</label><input class="inp" id="editDept" placeholder="e.g. ICU"></div>';
  h += '<div class="field"><label class="lbl">Job Title</label><input class="inp" id="editJobTitle" placeholder="e.g. Nurse"></div>';
  h += '</div>';
  h += '<div class="g2">';
  h += '<div class="field"><label class="lbl">Role</label><input class="inp" id="editRole" placeholder="e.g. nurse, doctor"></div>';
  h += '<div class="field"><label class="lbl">Active</label><select class="inp" id="editIsActive"><option value="true">Active</option><option value="false">Inactive</option></select></div>';
  h += '</div>';
  h += '<div style="display:flex;gap:10px;margin-top:12px">';
  h += '<button class="btn btn-gold" style="flex:1;padding:12px;font-weight:800" onclick="saveStaffEdit()">✅ Save Changes</button>';
  h += '<button class="btn" style="padding:12px 20px" onclick="closeEditStaff()">Cancel</button>';
  h += '</div></div>';
  h += '<div style="display:none" id="staffListContainer"></div>';
  staffListEl.innerHTML = h;
  loadStaffForEdit(staffId);
}

async function loadStaffForEdit(staffId) {
  try {
    var staff = await api("/notifications/all-staff");
    var s = staff.find(function(x){return x.staff_id === staffId;});
    if (s) {
      g("editFirstName").value = s.first_name || "";
      g("editLastName").value = s.last_name || "";
      g("editEmail").value = s.email || "";
      g("editPhone").value = s.phone || "";
      g("editDept").value = s.dept_code || "";
      g("editJobTitle").value = s.job_title || "";
      g("editRole").value = s.role || "";
      g("editIsActive").value = s.is_active ? "true" : "false";
    }
  } catch(e) { g("editStaffErr").textContent = e.message; g("editStaffErr").style.display = ""; }
}

async function saveStaffEdit() {
  g("editStaffErr").style.display = "none"; g("editStaffOk").style.display = "none";
  if (!currentEditStaffId) return;
  try {
    await api("/notifications/staff/"+currentEditStaffId, { method: "PUT", body: {
      firstName: g("editFirstName").value.trim(),
      lastName: g("editLastName").value.trim(),
      email: g("editEmail").value.trim(),
      phone: g("editPhone").value.trim(),
      deptCode: g("editDept").value.trim(),
      jobTitle: g("editJobTitle").value.trim(),
      role: g("editRole").value.trim(),
      isActive: g("editIsActive").value === "true"
    }});
    g("editStaffOk").textContent = "✅ Staff member updated successfully.";
    g("editStaffOk").style.display = "";
    setTimeout(function(){closeEditStaff();loadStaffList();},1500);
  } catch(e) { g("editStaffErr").textContent = e.message; g("editStaffErr").style.display = ""; }
}

function closeEditStaff() {
  var panel = document.getElementById("editStaffPanel");
  if (panel) panel.style.display = "none";
  loadStaffList();
}

async function loadUnverifiedPatients() {
  var el = g("unverifiedPatients");
  if (!el) return;
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tf)">Loading...</div>';
  try {
    var patients = await api("/notifications/unverified-patients");
    renderUnverifiedPatients(patients);
  } catch(e) { el.innerHTML = '<div class="danger-box">'+e.message+'</div>'; }
}

function renderUnverifiedPatients(patients) {
  var el = g("unverifiedPatients");
  if (!patients || !patients.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tf)">No unverified patients</div>';
    return;
  }
  var h = '<table class="tbl"><thead><tr><th>Name</th><th>Patient ID</th><th>Email</th><th>Actions</th></tr></thead><tbody>';
  patients.forEach(function(p) {
    var name = [p.first_name, p.last_name].filter(Boolean).join(" ");
    h += '<tr><td style="font-weight:600;font-size:12px">'+name+'</td>';
    h += '<td style="font-size:11px">'+p.patient_id+'</td>';
    h += '<td style="font-size:11px">'+(p.email || "—")+'</td>';
    h += '<td><button class="btn" style="padding:4px 8px;font-size:10px;margin-right:4px" onclick="resendPatientVerify(\''+p.patient_id+'\')">📧 Resend</button>';
    h += '<button class="btn btn-gold" style="padding:4px 8px;font-size:10px;margin-right:4px" onclick="verifyPatientManual(\''+p.patient_id+'\')">✓ Verify</button>';
    h += '<button class="btn" style="padding:4px 8px;font-size:10px" onclick="viewPatientProfile(\''+p.patient_id+'\')">👁 View</button></td></tr>';
  });
  h += '</tbody></table>';
  el.innerHTML = h;
}

async function resendPatientVerify(patientId) {
  if (!confirm("Resend verification email to patient "+patientId+"?")) return;
  try {
    await api("/notifications/resend-patient-verification", { method: "POST", body: { patientId } });
    alert("✅ Verification email sent!");
    loadUnverifiedPatients();
  } catch(e) { alert(e.message); }
}

async function verifyPatientManual(patientId) {
  if (!confirm("Manually verify patient "+patientId+"? They will be able to log in without email verification.")) return;
  try {
    await api("/notifications/verify-patient-manual", { method: "POST", body: { patientId } });
    alert("✅ Patient has been verified and can now log in!");
    loadUnverifiedPatients();
  } catch(e) { alert(e.message); }
}

async function viewPatientProfile(patientId) {
  try {
    var patients = await api("/notifications/all-patients");
    var p = patients.find(function(x){return x.patient_id === patientId;});
    if (!p) { alert("Patient not found"); return; }
    var html = '<div style="background:var(--gs1);border:1px solid var(--gbd);border-radius:16px;padding:22px;margin-top:16px;max-width:500px">';
    html += '<div class="sec-title">🏥 Patient Profile <span style="font-size:11px;color:var(--tf);font-weight:400">('+patientId+')</span></div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">';
    html += '<div><div style="font-size:11px;color:var(--tf)">Name</div><div style="font-weight:600">'+(p.first_name||'')+' '+(p.last_name||'')+'</div></div>';
    html += '<div><div style="font-size:11px;color:var(--tf)">Patient ID</div><div style="font-weight:600">'+p.patient_id+'</div></div>';
    html += '<div><div style="font-size:11px;color:var(--tf)">Email</div><div>'+(p.email||'—')+'</div></div>';
    html += '<div><div style="font-size:11px;color:var(--tf)">Phone</div><div>'+(p.phone||'—')+'</div></div>';
    html += '<div><div style="font-size:11px;color:var(--tf)">Verified</div><div>'+(p.email_verified?'✓ Yes':'❌ No')+'</div></div>';
    html += '<div><div style="font-size:11px;color:var(--tf)">Active</div><div>'+(p.is_active?'✓ Yes':'❌ No')+'</div></div>';
    html += '<div><div style="font-size:11px;color:var(--tf)">Created</div><div>'+(p.created_at?new Date(p.created_at).toLocaleDateString():'—')+'</div></div>';
    html += '</div>';
    html += '<div style="margin-top:16px"><button class="btn" onclick="loadAllPatients()">Close</button></div>';
    html += '</div>';
    var el = g("allPatientsList");
    if (el) el.innerHTML = html;
  } catch(e) { alert(e.message); }
}

async function loadAllPatients() {
  var unv = g("unverifiedPatients");
  var all = g("allPatientsSection");
  var allList = g("allPatientsList");
  if (unv) unv.parentElement.style.display = "none";
  if (all) all.style.display = "block";
  if (allList) allList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tf)">Loading...</div>';
  try {
    var patients = await api("/notifications/all-patients");
    renderAllPatients(patients);
  } catch(e) { if (allList) allList.innerHTML = '<div class="danger-box">'+e.message+'</div>'; }
}

function renderAllPatients(patients) {
  var el = g("allPatientsList");
  if (!patients || !patients.length) {
    if (el) el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tf)">No patients found</div>';
    return;
  }
  var h = '<table class="tbl"><thead><tr><th>Name</th><th>Patient ID</th><th>Email</th><th>Verified</th><th>Active</th><th>Actions</th></tr></thead><tbody>';
  patients.forEach(function(p) {
    var name = [p.first_name, p.last_name].filter(Boolean).join(" ");
    var verified = p.email_verified ? '<span class="badge bg">✓</span>' : '<span class="badge br">Pending</span>';
    var active = p.is_active ? '<span class="badge bg">✓</span>' : '<span class="badge br">Inactive</span>';
    var actions = '';
    if (!p.email_verified) {
      actions += '<button class="btn" style="padding:3px 6px;font-size:10px;margin-right:4px" onclick="resendPatientVerify(\''+p.patient_id+'\')">📧</button>';
      actions += '<button class="btn btn-gold" style="padding:3px 6px;font-size:10px;margin-right:4px" onclick="verifyPatientManual(\''+p.patient_id+'\')">✓</button>';
    }
    actions += '<button class="btn" style="padding:3px 6px;font-size:10px" onclick="viewPatientProfile(\''+p.patient_id+'\')">👁</button>';
    h += '<tr><td style="font-weight:600;font-size:12px">'+name+'</td>';
    h += '<td style="font-size:11px">'+p.patient_id+'</td>';
    h += '<td style="font-size:11px">'+(p.email || "—")+'</td>';
    h += '<td>'+verified+'</td>';
    h += '<td>'+active+'</td>';
    h += '<td>'+actions+'</td></tr>';
  });
  h += '</tbody></table>';
  if (el) el.innerHTML = h;
}

function showUnverifiedOnly() {
  var unv = g("unverifiedPatients");
  var all = g("allPatientsSection");
  if (unv) unv.parentElement.style.display = "block";
  if (all) all.style.display = "none";
  loadUnverifiedPatients();
}

</script>
</body></html>
