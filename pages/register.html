  }catch(e){
    var submitBtn=body.querySelector(".btn-submit");
    if(submitBtn){submitBtn.disabled=false;submitBtn.textContent="✅ Submit Registration";}
    
    var errorMsg="Registration failed";
    var errorDetails=e.message||"Unknown error";
    var debugInfo=e.message;
    
    // Add HTTP status to debug info if available
    if(e.status){
      debugInfo="HTTP "+e.status+" - "+debugInfo;
    }
    
    // Parse error messages for better UX
    if(e.status===409||errorDetails.includes("Email already")||errorDetails.includes("23505")){
      errorMsg="Email already registered";
      errorDetails="This email is already registered in the system. Try logging in instead or use a different email address.";
    }else if(e.isNetworkError||errorDetails.includes("network")||errorDetails.includes("fetch")){
      errorMsg="🛑 Connection Error";
      errorDetails="Cannot reach the server. Check your internet connection or try again in a few moments.";
    }else if(e.status===500||errorDetails.includes("Server error")){
      errorMsg="⚙️ Server Error";
      errorDetails="The server encountered an unexpected error. Please try again later or contact support.";
    }else if(e.status===400||errorDetails.includes("400")){
      errorMsg="❌ Invalid Data";
      errorDetails="Please check all required fields (marked with *) and ensure they are correctly filled.";
    }else if(e.status===401||e.status===403){
      errorMsg="⛔ Authorization Error";
      errorDetails="You don't have permission to perform this action. Please log in again.";
    }
    
    var eb=document.createElement("div");
    eb.className="danger-box";
    eb.style.marginTop="10px";
    eb.style.padding="12px";
    eb.style.borderRadius="8px";
    eb.innerHTML='<div style="font-weight:600;margin-bottom:8px;font-size:14px">'+errorMsg+'</div>'
      +'<div style="font-size:13px;color:var(--tm);line-height:1.5;margin-bottom:8px">'+errorDetails+'</div>'
      +'<div style="font-size:10px;color:var(--tf);margin-top:8px;padding:6px;background:var(--gs2);border-radius:4px;font-family:monospace;word-break:break-all">📋 '+escapeHtml(debugInfo)+'</div></div>';
    body.appendChild(eb);
    
    // Scroll error into view
    if(eb.scrollIntoView)eb.scrollIntoView({behavior:"smooth",block:"center"});
  }
}

function escapeHtml(t){return(t||"").replace(/[&<>"']/g,function(c){var m={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":'&#39;'};return m[c];});}

function rDone(body){
  rsb(6);var cid=S.atype==="staff"?S.sid:S.pid;var fn=[S.fn,S.mn,S.ln].filter(Boolean).join(" ");
  var dn=(DEPTS.find(function(d){return d.c===S.dept;})||{n:"—"}).n;
  body.innerHTML='<div class="success-wrap"><div class="success-ico">✓</div><h2 style="font-size:20px;font-weight:800;margin-bottom:8px">Registration Complete!</h2><p style="color:var(--tm);font-size:13px;margin-bottom:18px">Welcome, <strong>'+fn+'</strong>! Check your email.</p><div class="cred-box"><div class="cred-row"><span class="cred-k">'+(S.atype==="staff"?"Staff ID (Login Username)":"Patient ID")+'</span><span class="cred-v mono">'+cid+'</span></div><div class="cred-row"><span class="cred-k">Email</span><span class="cred-v">'+S.email+'</span></div><div class="cred-row"><span class="cred-k">Phone (formatted)</span><span class="cred-v">'+S.phone+'</span></div></div><div class="gold-box">📧 Verification email sent to <strong>'+S.email+'</strong>. Click the link to activate your account.</div><button class="btn-restart" onclick="location.reload()">Register Another Person</button></div>';
}
