      +'<div class="stat-card"><div class="stat-lbl">Total Staff</div><div class="stat-num" style="color:var(--gold-l)">'+d.length+'</div></div>'
      +'<div class="stat-card"><div class="stat-lbl">Admin Slots Used</div><div class="stat-num" style="color:var(--dg)">'+admins.length+'/3</div></div>'
      +'<div class="stat-card"><div class="stat-lbl">Active</div><div class="stat-num" style="color:var(--sg)">'+d.filter(function(s){return s.is_active;}).length+'</div></div>'
      +'</div>'
      +(admins.length>0?'<div class="gold-box" style="margin-bottom:14px">👑 Current Admins: '+admins.map(function(a){return'<strong>'+a.first_name+' '+a.last_name+'</strong> ('+a.staff_id+')';}).join(', ')+'</div>':'')
      +'<div class="filter-bar"><input class="inp" id="si" placeholder="Search staff..." style="max-width:240px" oninput="searchQ=this.value;clearTimeout(window._st);window._st=setTimeout(load,400)"><select class="inp" style="max-width:150px" onchange="filterRole=this.value;load()"><option value="">All Roles</option>'+["admin","doctor","nurse","receptionist","pharmacist","lab_tech"].map(function(r){return'<option value="'+r+'">'+r+'</option>';}).join('')+'</select></div>'
      +'<div class="card" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr><th>Staff ID</th><th>Name</th><th>Role</th><th>Department</th><th>Job Title</th><th>Email</th><th>Last Login</th><th>Status</th></tr></thead><tbody>'
      +d.map(function(s){return'<tr>'
        +'<td><span class="mono" style="color:var(--gold-l)">'+s.staff_id+'</span></td>'
        +'<td style="font-weight:600">'+s.first_name+' '+s.last_name+'</td>'
        +'<td><span class="badge '+rb(s.role)+'">'+s.role+(s.admin_type?' · '+s.admin_type:'')+'</span></td>'
        +'<td><span class="badge bgold">'+(s.dept_code||'—')+'</span></td>'
        +'<td style="font-size:11px">'+(s.job_title||'—')+'</td>'
        +'<td style="font-size:11px">'+s.email+'</td>'
        +'<td style="font-size:11px;color:var(--tf)">'+(s.last_login?new Date(s.last_login).toLocaleString('en-KE'):'Never')+'</td>'
        +'<td><span class="badge '+(s.is_active?'bg':'br')+'">'+(s.is_active?'Active':'Inactive')+'</span></td>'
        +'</tr>';}).join('')
      +'</tbody></table></div>';
  }catch(e){g("pc").innerHTML='<div class="danger-box">'+e.message+'</div>';}
}
load();
}

</script>
<script src="settings.js"></script>
</body></html>
