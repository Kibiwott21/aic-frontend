<script>
requireAuth();
buildSidebar("patient-journey.html");

var journeys=[];
async function load(){
  try{
    var j=await api("/journey/active");
    journeys=j;
    render(j);
  }catch(e){g("pc").innerHTML='<div class="danger-box">'+e.message+'</div>';}
}

function render(j){
  var h='<div class="page-hdr"><div><div class="page-title">🏥 Patient Journey</div>';
  h+='<div class="page-sub">Real-time patient flow · Each department documents their step · Steps locked on submission</div></div>';
  if(isReceptionist||isAdmin){h+='<button class="btn btn-gold" onclick="openAdmit()">+ Admit Patient</button>';}
  h+='</div>';

  // Flow diagram
  h+='<div class="card" style="background:var(--s2);margin-bottom:18px">';
  h+='<div class="sec-title"><span>📊 Departmental Flow — Patient Journey</span></div>';
  h+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center">';
  var flow=[{c:"REC",n:"Reception",i:"🏥"},{c:"TRG",n:"Triage",i:"🩺"},{c:"OUT",n:"Outpatient",i:"👨‍⚕️"},{c:"LAB",n:"Laboratory",i:"🔬"},{c:"RAD",n:"Radiology",i:"📷"},{c:"PHA",n:"Pharmacy",i:"💊"}];
  flow.forEach(function(f,i){
    var mine=f.c===user.dept;
    h+='<div style="text-align:center;padding:8px 12px;background:'+(mine?'var(--gs2)':'var(--s1)')+';border:2px solid '+(mine?'var(--gold)':'var(--bd)')+';border-radius:10px;min-width:78px">';
    h+='<div style="font-size:18px">'+f.i+'</div>';
    h+='<div style="font-size:10px;font-weight:700;color:'+(mine?'var(--gold)':'var(--tm)')+'">'+f.n+'</div>';
    h+='</div>';
    if(i<flow.length-1)h+='<div style="color:var(--tf);font-size:18px">→</div>';
  });
  h+='</div></div>';

  // Active patients
  h+='<div class="card" style="padding:0;overflow:hidden">';
  h+='<div style="padding:14px 16px;border-bottom:1px solid var(--gbd);display:flex;align-items:center;justify-content:space-between">';
  h+='<div class="sec-title" style="border:none;margin:0"><span>🟢 Active Patients Today ('+j.length+')</span></div>';
  h+='<button class="btn" onclick="load()" style="font-size:11px">⟳ Refresh</button></div>';
  if(j.length){
    h+='<table class="tbl"><thead><tr><th>Journey No</th><th>Patient</th><th>Visit Type</th><th>Current Dept</th><th>Steps Done</th><th>Started</th><th>Actions</th></tr></thead><tbody>';
    j.forEach(function(jn){
      h+='<tr>';
      h+='<td class="mono" style="color:var(--gold);font-size:11px">'+jn.journey_no+'</td>';
      h+='<td><div style="font-weight:600">'+jn.patient_name+'</div><div class="mono" style="color:var(--tf);font-size:10px">'+jn.pid+'</div></td>';
      h+='<td><span class="badge bb">'+jn.visit_type+'</span></td>';
      h+='<td><span class="badge bgold">'+(jn.current_dept||'REC')+'</span></td>';
      h+='<td style="text-align:center">'+( jn.step_count||0)+'</td>';
      h+='<td class="mono" style="font-size:10px">'+new Date(jn.created_at).toLocaleTimeString("en-KE",{hour:"2-digit",minute:"2-digit"})+'</td>';
      h+='<td><div style="display:flex;gap:4px">';
      h+='<button class="btn" style="font-size:10px;padding:3px 8px" onclick="viewJourney(\''+jn.id+'\',\''+jn.patient_name.replace(/'/g,"")+'\')">👁 View</button>';
      h+='<button class="btn btn-gold" style="font-size:10px;padding:3px 8px" onclick="openStep(\''+jn.id+'\',\''+jn.patient_name.replace(/'/g,"")+'\')">➕ Add Step</button>';
      if(isReceptionist||isAdmin){h+='<button class="btn btn-g" style="font-size:10px;padding:3px 8px" onclick="completeJourney(\''+jn.id+'\')">✓ Done</button>';}
      h+='</div></td>';
      h+='</tr>';
    });
    h+='</tbody></table>';
  } else {
    h+='<div style="padding:30px;text-align:center;color:var(--tf)">No active patients today. Receptionist can admit a patient using the button above.</div>';
  }
  h+='</div>';
  g("pc").innerHTML=h;
}

async function viewJourney(id,name){
  try{
    var d=await api("/journey/"+id);
    var j=d.journey;var steps=d.steps;
    var h='<div class="page-hdr"><div><div class="page-title">🏥 '+name+'</div>';
    h+='<div class="page-sub">Journey: '+j.journey_no+' · '+j.visit_type+' · Chief complaint: '+(j.chief_complaint||'—')+'</div></div>';
    h+='<button class="btn" onclick="load()">← Back</button></div>';
    // Patient summary
    h+='<div class="card-gold" style="border-radius:12px;margin-bottom:14px;padding:12px 16px">';
    h+='<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px">';
    h+='<span><strong>DOB:</strong> '+(j.date_of_birth?j.date_of_birth.slice(0,10):"—")+'</span>';
    h+='<span><strong>Gender:</strong> '+(j.gender||"—")+'</span>';
    h+='<span><strong>Blood:</strong> <span class="badge ba">'+(j.blood_group||"—")+'</span></span>';
    h+='<span><strong>Allergies:</strong> '+(j.allergies||"None")+'</span>';
    h+='<span><strong>Chronic:</strong> '+(j.chronic_conditions||"None")+'</span>';
    h+='</div></div>';
    // Steps
    if(steps.length){
      h+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">';
      h+='<div style="padding:12px 16px;border-bottom:1px solid var(--gbd);font-weight:700;color:var(--a2)">📋 Journey Timeline ('+steps.length+' step(s))</div>';
      steps.forEach(function(s,i){
        var ac={received:"bb",triaged:"ba",assessed:"ba",treated:"bg",forwarded:"bgold",prescribed:"bb",dispensed:"bg",discharged:"bg",referred:"br"}[s.action]||"bgr";
        h+='<div style="padding:14px 16px;border-bottom:1px solid var(--bd)'+(i===steps.length-1?"0":"")+';">';
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">';
        h+='<div style="width:26px;height:26px;border-radius:50%;background:var(--gold);color:#fff;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</div>';
        h+='<span class="badge bgold">'+( s.dept_name||s.dept_code)+'</span>';
        h+='<span class="badge '+ac+'">'+s.action.toUpperCase()+'</span>';
        if(s.locked)h+='<span class="badge br" style="font-size:9px">🔒 LOCKED</span>';
        h+='<span style="font-size:10px;color:var(--tf);margin-left:auto">'+s.recorder_name+' · '+new Date(s.created_at).toLocaleTimeString("en-KE",{hour:"2-digit",minute:"2-digit"})+'</span>';
        h+='</div>';
        if(s.vitals){var v=s.vitals;h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">';if(v.bp)h+='<span class="badge bb">BP: '+v.bp+'</span>';if(v.temp)h+='<span class="badge ba">Temp: '+v.temp+'°C</span>';if(v.pulse)h+='<span class="badge bgr">Pulse: '+v.pulse+' bpm</span>';if(v.weight)h+='<span class="badge bgr">Wt: '+v.weight+'kg</span>';if(v.spo2)h+='<span class="badge bb">SpO2: '+v.spo2+'%</span>';h+='</div>';}
        if(s.findings)h+='<div style="font-size:12px;color:var(--tm);margin-bottom:3px"><strong>Findings:</strong> '+s.findings+'</div>';
        if(s.treatment)h+='<div style="font-size:12px;color:var(--tm);margin-bottom:3px"><strong>Treatment:</strong> '+s.treatment+'</div>';
        if(s.next_dept)h+='<div style="font-size:11px;color:var(--wg);margin-top:3px">→ Forwarded to: <strong>'+s.next_dept+'</strong></div>';
        h+='</div>';
      });
      h+='</div>';
    } else {
      h+='<div class="gold-box" style="margin-bottom:14px">No steps recorded yet.</div>';
    }
    h+='<div style="display:flex;gap:8px">';
    h+='<button class="btn btn-gold" onclick="openStep(\''+id+'\',\''+name+'\')">➕ Add My Step</button>';
    h+='<button class="btn" onclick="load()">← Back to List</button>';
    h+='</div>';
    g("pc").innerHTML=h;
  }catch(e){alert(e.message);}
}

function openAdmit(){
  showModal("Admit New Patient",
    '<div class="field"><label class="lbl req">Patient ID</label><input class="inp" id="mPid" placeholder="PAT12345" oninput="this.value=this.value.toUpperCase()"></div>'+
    '<div class="field"><label class="lbl">Visit Type</label><select class="inp" id="mVtype"><option value="OPD">OPD</option><option value="Emergency">Emergency</option><option value="Follow-up">Follow-up</option><option value="Inpatient">Inpatient</option></select></div>'+
    '<div class="field"><label class="lbl req">Chief Complaint</label><textarea class="inp" id="mCC" rows="2" placeholder="What is the patient complaining of?"></textarea></div>',
    async function(){
      var pid=g("mPid")?.value.trim().toUpperCase();
      var cc=g("mCC")?.value.trim();
      if(!pid){alert("Enter Patient ID");return;}
      try{
        var pts=await api("/patients?search="+pid+"&limit=1");
        if(!pts.patients?.length){alert("Patient "+pid+" not found. Register them first.");return;}
        await api("/journey/start",{method:"POST",body:{patientId:pts.patients[0].id,visitType:g("mVtype")?.value,chiefComplaint:cc}});
        closeModal();load();
      }catch(e){alert(e.message);}
    }
  );
}

var currentJourneyId=null;var currentStepId=null;
function openStep(jId,name){
  currentJourneyId=jId;currentStepId=null;
  var isTriage=user.dept==="TRG";
  showModal("Document Step — "+name,
    '<div class="gold-box" style="margin-bottom:12px;font-size:11px">⚠ Once submitted, this step is PERMANENTLY LOCKED and cannot be edited.</div>'+
    '<div class="field"><label class="lbl req">Action Taken</label><select class="inp" id="mAction">'+
    ['received','triaged','assessed','treated','forwarded','prescribed','dispensed','discharged','referred'].map(function(a){return'<option value="'+a+'">'+a.charAt(0).toUpperCase()+a.slice(1)+'</option>';}).join('')+
    '</select></div>'+
    (isTriage?'<div style="background:var(--ibg);border-radius:9px;padding:12px;margin-bottom:10px;border:1px solid var(--ibd)"><div style="font-size:11px;font-weight:700;color:var(--ig);margin-bottom:8px">VITALS</div><div class="g2">'+
    '<div class="field"><label class="lbl">BP (mmHg)</label><input class="inp" id="vBP" placeholder="120/80"></div>'+
    '<div class="field"><label class="lbl">Temp (°C)</label><input class="inp" id="vTemp" placeholder="36.6"></div>'+
    '<div class="field"><label class="lbl">Pulse (bpm)</label><input class="inp" id="vPulse" placeholder="72"></div>'+
    '<div class="field"><label class="lbl">Weight (kg)</label><input class="inp" id="vWeight" placeholder="65"></div>'+
    '<div class="field"><label class="lbl">SpO2 (%)</label><input class="inp" id="vSPO2" placeholder="98"></div>'+
    '<div class="field"><label class="lbl">MUAC (cm)</label><input class="inp" id="vMUAC" placeholder=""></div>'+
    '</div></div>':'')+''+
    '<div class="field"><label class="lbl req">Findings / Observations</label><textarea class="inp" id="mFindings" rows="2" placeholder="What you found/observed about the patient..."></textarea></div>'+
    '<div class="field"><label class="lbl req">Treatment / Action Done</label><textarea class="inp" id="mTreatment" rows="2" placeholder="What was done for the patient..."></textarea></div>'+
    '<div class="field"><label class="lbl">Forward to Department</label><select class="inp" id="mNextDept"><option value="">— Do not forward —</option>'+
    ["TRG","OUT","EMG","SRG","LAB","RAD","PHA","PHY","INP","PED","MAT","ICU","MNT","DEN","OPT"].map(function(d){return'<option value="'+d+'">'+d+'</option>';}).join('')+'</select></div>'+
    '<div class="field"><label class="lbl">Notes</label><textarea class="inp" id="mNotes" rows="2" placeholder="Any additional notes..."></textarea></div>',
    async function(){
      var v=null;
      if(document.getElementById("vBP")){
        v={};
        if(g("vBP")?.value)v.bp=g("vBP").value;
        if(g("vTemp")?.value)v.temp=g("vTemp").value;
        if(g("vPulse")?.value)v.pulse=g("vPulse").value;
        if(g("vWeight")?.value)v.weight=g("vWeight").value;
        if(g("vSPO2")?.value)v.spo2=g("vSPO2").value;
        if(g("vMUAC")?.value)v.muac=g("vMUAC").value;
        if(!Object.keys(v).length)v=null;
      }
      try{
        var r=await api("/journey/"+currentJourneyId+"/step",{method:"POST",body:{
          action:g("mAction").value,findings:g("mFindings")?.value,
          treatment:g("mTreatment")?.value,vitals:v,
          nextDept:g("mNextDept")?.value||null,notes:g("mNotes")?.value
        }});
        currentStepId=r.id;
        if(confirm("Step saved. Submit and PERMANENTLY LOCK it now?\n\nClick OK to lock, Cancel to keep as draft.")){
          await api("/journey/step/"+currentStepId+"/submit",{method:"PUT",body:{}});
          alert("✅ Step submitted and permanently locked!");
        }
        closeModal();load();
      }catch(e){alert(e.message);}
    },
    "Save & Submit Step"
  );
}

async function completeJourney(id){
  var status=prompt("Mark journey as:\n1. completed\n2. discharged\n3. referred\n\nType the status:");
  if(!status)return;
  try{await api("/journey/"+id+"/complete",{method:"PUT",body:{status:status}});load();}
  catch(e){alert(e.message);}
}

// Modal helper
function showModal(title,body,onOk,okLabel){
  var old=g("globalModal");if(old)old.remove();
  var m=document.createElement("div");m.className="modal-overlay show";m.id="globalModal";
  m.onclick=function(e){if(e.target===m)closeModal();};
  m.innerHTML='<div class="modal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
    '<div style="font-size:15px;font-weight:700">'+title+'</div>'+
    '<button class="btn" onclick="closeModal()" style="padding:4px 10px;font-size:13px">✕</button>'+
    '</div>'+body+
    '<div class="btn-row" style="margin-top:14px">'+
    '<button class="btn-back" onclick="closeModal()">Cancel</button>'+
    '<button class="btn-submit" onclick="modalOk()">'+( okLabel||"Confirm")+'</button>'+
    '</div><div id="mErr" class="danger-box" style="display:none;margin-top:8px"></div></div>';
  document.body.appendChild(m);
  window._modalOk=onOk;
}
function closeModal(){var m=g("globalModal");if(m)m.remove();}
function modalOk(){if(window._modalOk)window._modalOk();}

load();

</script>
</body></html>
